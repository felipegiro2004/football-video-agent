name: Daily Matches

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Optional date YYYY-MM-DD (defaults to today)"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      RUN_DATE: ${{ inputs.run_date }}

    steps:
      - uses: actions/checkout@v3

      - run: sudo apt update && sudo apt install ffmpeg -y
      - run: pip install -r requirements.txt

      - run: python main.py

      - uses: actions/upload-artifact@v4
        with:
          name: videos-and-reports
          path: output/
